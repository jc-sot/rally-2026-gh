<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spirit of Technology Rally 2026</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Highlight.js CSS theme -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />

    <!-- Highlight.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Load Python syntax support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body class="bg-light">
    <!-- Menu -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand" href="index.html"
          >Spirit of Technology Rally 2026</a
        >
      </div>
    </nav>

    <!-- App container -->
    <main class="container py-5" id="app">
      <!-- Header -->
      <header class="mb-4 d-flex justify-content-between align-items-start">
        <div>
          <h1 class="h4 mb-1">Grade <span id="grade">1</span></h1>
          <p class="text-muted mb-0">
            Question <span id="questionNumber">1</span>
          </p>
        </div>
      </header>

      <!-- Question box -->
      <section class="row g-4">
        <div class="col-12">
          <div class="question-box p-4 bg-white border rounded d-flex">
            <div id="questionText" class="flex-grow-1 align-self-stretch">
              <!-- Question text injected here -->
            </div>
          </div>
        </div>

        <!-- Answer area -->
        <div class="col-12">
          <label for="answerInput" class="form-label">Your Answer</label>
          <textarea
            id="answerInput"
            class="form-control"
            rows="4"
            placeholder="Type your answer here"
          ></textarea>
        </div>

        <!-- Controls -->
        <div class="col-12 d-flex gap-2">
          <button id="submitBtn" class="btn btn-primary">Submit</button>
          <button id="clearBtn" class="btn btn-outline-secondary">Clear</button>
        </div>
      </section>
    </main>

    <!-- Modal response -->
    <div class="modal fade" id="responseModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content text-center">
          <div class="modal-body py-4">
            <div id="modalIcon" class="mb-2"></div>
            <div id="modalMessage" class="fw-semibold"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Quiz JS -->
    <script src="./assets/js/quiz.js"></script>
  </body>
</html>
