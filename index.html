<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Question</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

  <!-- Menu -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand" href="index.html">Quiz Home</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">All Questions</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html">Main Page</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page container -->
  <main class="container py-5">
    <!-- Header -->
    <header class="mb-4">
      <h1 class="h3">Question <span id="questionNumber">1</span></h1>
      <p class="text-muted">Answer the question below and press Submit.</p>
    </header>

    <!-- Question box and answer area -->
    <section class="row g-4">
      <div class="col-12">
        <div class="question-box p-4 bg-white border rounded d-flex align-items-center">
          <div id="questionText" class="flex-grow-1">
            <!-- Question text injected here -->
            <p class="mb-0">What is the capital of France?</p>
          </div>
        </div>
      </div>

      <div class="col-12">
        <label for="answerInput" class="form-label">Your Answer</label>
        <textarea id="answerInput" class="form-control" rows="4" placeholder="Type your answer here"></textarea>
      </div>

      <div class="col-12 d-flex gap-2">
        <button id="submitBtn" class="btn btn-primary">Submit</button>
        <button id="clearBtn" class="btn btn-outline-secondary">Clear</button>
      </div>
    </section>
  </main>

  <!-- Modal response -->
  <div class="modal fade" id="responseModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content text-center">
        <div class="modal-body py-4">
          <div id="modalIcon" class="mb-2"></div>
          <div id="modalMessage" class="fw-semibold"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Quiz JS -->
  <script src="assets/js/quiz.js"></script>
</body>
</html>
